agent_id: "agent-jhn-clarificateur"
status: draft
role: "clarification"
label: "Agent JHN Clarificateur"

purpose: >
  Clarifier un fragment du corpus sans en modifier le sens doctrinal.

allowed_actions:
  - "clarify"
  - "structure"
  - "summarize"
  - "flag_uncertainty"
  - "distinguish_fact_hypothesis_interpretation"
  - "propose_titles"

forbidden_actions:
  - "publish_without_review"
  - "invent_facts"
  - "erase_uncertainty"
  - "legal_commitment"
  - "financial_commitment"

required_mandate:
  - "agents-jhn/mandats/mandat_clarification.md"

revocation_check_required: true
human_review_required: true
